<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cedulia — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,600;1,400&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0e1a;
      --bg-card: #151a2e;
      --bg-elevated: #1c2038;
      --bg-deep: #080b14;
      --fg: #e8e6e1;
      --muted: #7b8298;
      --border: rgba(255,255,255,0.08);
      --highlight: #d4a054;
      --highlight-soft: rgba(212,160,84,0.10);
      --highlight-dim: rgba(212,160,84,0.22);
      --negative: #c45c5c;
      --positive: #5ca87c;
      --sans: 'Space Grotesk', system-ui, sans-serif;
      --serif: 'Spectral', Georgia, serif;
      --radius: 12px;
      --radius-sm: 8px;
      --radius-lg: 16px;
      --transition-fast: 150ms cubic-bezier(.4,0,.2,1);
      --transition-med: 250ms cubic-bezier(.4,0,.2,1);
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top right, rgba(212,160,84,0.08), transparent 30%),
        var(--bg);
      color: var(--fg);
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── CONTENT WRAPPER (lockable) ─── */
    .content-wrapper {
      position: relative;
      width: 100%;
      max-width: 760px;
    }

    .content-wrapper.locked .card {
      filter: blur(6px);
      pointer-events: none;
      user-select: none;
      opacity: 0.45;
    }

    .card {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 56px 40px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.35);
      text-align: center;
      transition: filter var(--transition-med), opacity var(--transition-med);
    }

    .eyebrow {
      font-family: var(--sans);
      font-size: 0.78rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--highlight);
      margin-bottom: 20px;
    }

    h1 {
      font-family: var(--sans);
      font-size: clamp(2.4rem, 7vw, 4.4rem);
      line-height: 1.05;
      letter-spacing: -1px;
      margin-bottom: 18px;
    }

    .type {
      display: inline-block;
      font-family: var(--sans);
      font-size: 0.82rem;
      letter-spacing: 1.3px;
      text-transform: uppercase;
      color: var(--muted);
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 999px;
      margin-bottom: 22px;
    }

    .description {
      font-family: var(--serif);
      font-size: 1.16rem;
      line-height: 1.8;
      color: var(--fg);
      max-width: 560px;
      margin: 0 auto 30px;
    }

    .status {
      display: inline-block;
      font-family: var(--sans);
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--highlight);
      background: var(--highlight-soft);
      border: 1px solid var(--highlight-dim);
      border-radius: 999px;
      padding: 10px 16px;
    }

    /* ─── GATE OVERLAY ─── */
    .gate-overlay {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .gate-overlay.hidden {
      display: none;
    }

    .gate-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 36px 32px 28px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      width: 100%;
      max-width: 440px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
    }

    .gate-tabs-row {
      display: flex;
      gap: 0;
      margin-bottom: 28px;
      border-bottom: 1px solid var(--border);
    }

    .gate-tab {
      flex: 1;
      background: none;
      border: none;
      padding: 14px 8px;
      font-family: var(--sans);
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color var(--transition-fast), border-color var(--transition-fast);
      min-height: 44px;
    }

    .gate-tab:hover {
      color: var(--fg);
    }

    .gate-tab.active {
      color: var(--highlight);
      border-bottom-color: var(--highlight);
    }

    .gate-panel {
      display: none;
    }

    .gate-panel.active {
      display: block;
    }

    .gate-input {
      width: 100%;
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      font-family: var(--sans);
      font-size: 0.9rem;
      color: var(--fg);
      transition: border-color var(--transition-fast);
    }

    .gate-input::placeholder {
      color: var(--muted);
    }

    .gate-input:focus {
      outline: none;
      border-color: var(--highlight);
    }

    .gate-input.code-input {
      text-align: center;
      font-size: 1.05rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .gate-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      margin-top: 18px;
      background: var(--highlight);
      color: var(--bg);
      font-family: var(--sans);
      font-weight: 700;
      font-size: 0.85rem;
      border: none;
      border-radius: var(--radius-sm);
      padding: 14px 28px;
      cursor: pointer;
      min-height: 48px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: background var(--transition-fast), transform var(--transition-fast);
    }

    .gate-btn:hover {
      background: #e8b468;
      transform: translateY(-2px);
    }

    .gate-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .gate-btn.secondary {
      background: var(--bg-elevated);
      color: var(--highlight);
      border: 1px solid rgba(212,160,84,0.25);
    }

    .gate-btn.secondary:hover {
      background: var(--highlight-soft);
    }

    .gate-btn .gate-spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(10,14,26,0.2);
      border-top-color: var(--bg);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    .gate-btn.secondary .gate-spinner {
      border-color: rgba(212,160,84,0.2);
      border-top-color: var(--highlight);
    }

    .gate-btn.loading .gate-spinner {
      display: block;
    }

    .gate-btn.loading .gate-btn-text {
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .gate-msg {
      margin-top: 14px;
      padding: 12px;
      border-radius: var(--radius-sm);
      font-family: var(--sans);
      font-size: 0.8rem;
      text-align: center;
      display: none;
    }

    .gate-msg.success {
      display: block;
      background: rgba(92,168,124,0.15);
      color: var(--positive);
      border: 1px solid rgba(92,168,124,0.25);
    }

    .gate-msg.error {
      display: block;
      background: rgba(196,92,92,0.15);
      color: var(--negative);
      border: 1px solid rgba(196,92,92,0.25);
    }

    .gate-hint {
      font-family: var(--sans);
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 14px;
      text-align: center;
      line-height: 1.5;
    }

    @media (max-width: 640px) {
      .card {
        padding: 42px 24px;
      }

      .description {
        font-size: 1.02rem;
      }

      .gate-box {
        padding: 28px 20px 22px;
      }
    }
  </style>
</head>
<body>

  <div class="content-wrapper locked" id="contentWrapper">

    <!-- GATE OVERLAY -->
    <div class="gate-overlay" id="gateOverlay">
      <div class="gate-box">
        <div class="gate-tabs-row">
          <button class="gate-tab active" data-panel="code" type="button">I have an invite code</button>
          <button class="gate-tab" data-panel="request" type="button">Request access</button>
        </div>

        <div class="gate-panel active" id="panelCode">
          <input class="gate-input code-input" id="inviteCodeInput" type="text" placeholder="CEDULIA-XXXX-XXXX" maxlength="18" autocomplete="off" spellcheck="false" aria-label="Invite code">
          <button class="gate-btn" id="btnValidateCode" type="button">
            <span class="gate-btn-text">Validate Code</span>
            <span class="gate-spinner" aria-hidden="true"></span>
          </button>
          <div class="gate-msg" id="codeFeedback"></div>
        </div>

        <div class="gate-panel" id="panelRequest">
          <input class="gate-input" id="requestEmailInput" type="email" placeholder="your@email.com" autocomplete="email" aria-label="Email address">
          <button class="gate-btn secondary" id="btnRequestAccess" type="button">
            <span class="gate-btn-text">Send Request</span>
            <span class="gate-spinner" aria-hidden="true"></span>
          </button>
          <div class="gate-msg" id="requestFeedback"></div>
          <p class="gate-hint">We'll review your request and send an invite code to your email.</p>
        </div>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <main class="card">
      <div class="eyebrow">Coming Soon</div>
      <h1>Cedulia</h1>
      <div class="type">Creative Writing Engine</div>
      <p class="description">
        Generative writing through formal composition and structural transformation.
      </p>
      <div class="status">In Development</div>
    </main>

  </div>

<script>
(function(){
'use strict';

const CEDULIA_API_BASE = 'https://n8n.tropus.io/webhook';
const ENDPOINTS = {
  validate: CEDULIA_API_BASE + '/cedulia-invite-validate',
  request:  CEDULIA_API_BASE + '/cedulia-access-request'
};

// DOM
const contentWrapper   = document.getElementById('contentWrapper');
const gateOverlay      = document.getElementById('gateOverlay');
const gateTabBtns      = document.querySelectorAll('.gate-tab');
const gatePanelEls     = document.querySelectorAll('.gate-panel');
const inviteCodeInput  = document.getElementById('inviteCodeInput');
const btnValidateCode  = document.getElementById('btnValidateCode');
const codeFeedback     = document.getElementById('codeFeedback');
const requestEmailInput = document.getElementById('requestEmailInput');
const btnRequestAccess  = document.getElementById('btnRequestAccess');
const requestFeedback   = document.getElementById('requestFeedback');

let sessionToken = null;

// ─── Token persistence ───
function saveToken(t) { sessionToken = t; try { localStorage.setItem('cedulia_token', t); } catch(e) {} }
function loadToken()   { try { return localStorage.getItem('cedulia_token'); } catch(e) { return null; } }
function clearToken()  { sessionToken = null; try { localStorage.removeItem('cedulia_token'); } catch(e) {} }

// ─── Lock / Unlock ───
function unlockContent() {
  contentWrapper.classList.remove('locked');
  gateOverlay.classList.add('hidden');
}

function lockContent() {
  contentWrapper.classList.add('locked');
  gateOverlay.classList.remove('hidden');
  resetGateFeedback();
}

// ─── Feedback helpers ───
function resetGateFeedback() {
  [codeFeedback, requestFeedback].forEach(el => { el.className = 'gate-msg'; el.textContent = ''; });
}

function showGateFeedback(el, msg, type) {
  el.className = 'gate-msg ' + type;
  el.textContent = msg;
}

function setGateLoading(btn, loading) {
  if (loading) { btn.classList.add('loading'); btn.disabled = true; }
  else { btn.classList.remove('loading'); btn.disabled = false; }
}

// ─── Gate tabs ───
gateTabBtns.forEach(tab => {
  tab.addEventListener('click', () => {
    const panel = tab.dataset.panel;
    gateTabBtns.forEach(t => t.classList.remove('active'));
    gatePanelEls.forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(panel === 'code' ? 'panelCode' : 'panelRequest').classList.add('active');
    resetGateFeedback();
  });
});

// ─── Validate invite code ───
btnValidateCode.addEventListener('click', async () => {
  const code = inviteCodeInput.value.trim().toUpperCase();
  if (!code) { showGateFeedback(codeFeedback, 'Please enter your invite code.', 'error'); inviteCodeInput.focus(); return; }

  setGateLoading(btnValidateCode, true);
  resetGateFeedback();

  try {
    const res = await fetch(ENDPOINTS.validate, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ invite_code: code })
    });
    const data = await res.json();

    if (res.ok && data.token) {
      saveToken(data.token);
      showGateFeedback(codeFeedback, 'Access granted!', 'success');
      setTimeout(() => unlockContent(), 600);
    } else {
      showGateFeedback(codeFeedback, data.message || 'Invalid invite code.', 'error');
    }
  } catch (err) {
    showGateFeedback(codeFeedback, 'Connection error. Please try again.', 'error');
  } finally {
    setGateLoading(btnValidateCode, false);
  }
});

inviteCodeInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); btnValidateCode.click(); } });

// ─── Request access ───
btnRequestAccess.addEventListener('click', async () => {
  const email = requestEmailInput.value.trim();
  if (!email || !email.includes('@') || !email.includes('.')) {
    showGateFeedback(requestFeedback, 'Please enter a valid email address.', 'error');
    requestEmailInput.focus();
    return;
  }

  setGateLoading(btnRequestAccess, true);

  try {
    const res = await fetch(ENDPOINTS.request, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email })
    });
    const data = await res.json();

    if (res.ok) {
      showGateFeedback(requestFeedback, 'Request received! Check your email for an invite code.', 'success');
      requestEmailInput.value = '';
    } else {
      showGateFeedback(requestFeedback, data.message || 'Something went wrong.', 'error');
    }
  } catch (err) {
    showGateFeedback(requestFeedback, 'Connection error. Please try again.', 'error');
  } finally {
    setGateLoading(btnRequestAccess, false);
  }
});

requestEmailInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); btnRequestAccess.click(); } });

// ─── Session check on load ───
async function checkSession() {
  const token = loadToken();
  if (!token) { lockContent(); return; }
  sessionToken = token;

  try {
    const res = await fetch(ENDPOINTS.validate, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: token })
    });
    const data = await res.json();

    if (res.ok && data.token) {
      unlockContent();
    } else {
      clearToken();
      lockContent();
    }
  } catch (err) {
    clearToken();
    lockContent();
  }
}

checkSession();

})();
</script>
</body>
</html>
